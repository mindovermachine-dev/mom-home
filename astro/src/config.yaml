site:
  name: Mind over Machine
  site: 'https://www.mindovermachine.dk'
  base: '/'
  trailingSlash: ignore

  googleSiteVerificationId:

# Default SEO metadata
metadata:
  title:
    default: Mind over Machine
    template: '%s | Mind over Machine'
  description: 'Regenerative software development through essays, events, and services.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Mind over Machine
    images:
      - url: '~/assets/images/mom-og-default-1200x630.png'
        width: 1200
        height: 630
    type: website
  twitter:
    handle:
    site:
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'essays'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-T2KTNC1VRC' # null or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
