name: Prep-runner
description: Sets the GitHub workflow to do what we need

inputs:
  verify:
    description: Script to run to verify the environment is set up correctly. If not provided, no verification will be done.
    required: false

runs:
  using: composite
  steps:
    - name: install insitu
      shell: bash
      run: |
        gh extension install devx-cafe/gh-insitu

    - name: Verify environment
      if: ${{ inputs.verify }}
      shell: bash
      run: |
        ${{ inputs.verify }} --mark-pending

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: astro/package-lock.json

    - name: Prepare runner environment
      shell: bash
      run: |
        gh insitu run prep-runner

    - name: Verify environment
      if: ${{ inputs.verify }}
      shell: bash
      run: ${{ inputs.verify }}
