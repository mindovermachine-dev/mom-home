name: Ready
# This workflow is triggered by 'ready' branches

on:
  workflow_dispatch:
  push:
    branches:
      - "ready/**"

concurrency:
  group: ready
  cancel-in-progress: false

jobs:
  build:
    name: Build and upload Astro site
    runs-on: ubuntu-latest
    permissions:
      contents: read # required to push the merge commit to trunk
      statuses: write # required to set the trunk-worthy status check and for gh insitu
      pages: write # required to deploy to GitHub Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        run: npm run install:astro

      - name: Set up and verify runner environment
        uses: ./.github/actions/prep-runner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          verify: gh insitu run trunk-worthy

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Write version.txt
        run: npm run write-version
        env:
          BUILD_REPO: ${{ github.repository }}
          BUILD_REF: ${{ github.ref_name }}
          BUILD_SHA: ${{ github.sha }}

      - name: Build with Astro
        run: npm run build -- --site "${{ steps.pages.outputs.origin }}" --base "${{ steps.pages.outputs.base_path }}"

      - name: Disable Jekyll processing in deployed github-pages artifact
        run: touch astro/dist/.nojekyll

      - name: Upload build artifact
        id: upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages-${{ github.sha }}
          path: astro/dist
          retention-days: 3

  merge-to-trunk:
    name: Merge to trunk
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      pull-requests: write
      issues: write
      contents: write

    steps:
      # Not sue what goes on here? Whre did the secret come from?
      # check *./docs/ready-pusher.md' for more details on how to set up and use this workflow
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch full history to ensure we can merge and push
          token: ${{ secrets.READY_PUSHER }} # PAT with content:write (can not use secrets.GITHUB_TOKEN as it is a special case, it does not trigger other workflows on push)

      - uses: devx-cafe/takt-actions/ready-to-trunk@v1
        # with: #Uncomment if you want to override any of the default inputs
        # target_branch: #default is main
        # user_name: #default is "Ready Pusher Bot"
        # user_email: #default is "ready-pusher@${{ github.repository_owner }}.github.com"
        # delete_dev_branch: false # default is true
        # delete_ready_branch: false # default is true
        # close_pr: false # default is true
        # close_issue: false # default is true
